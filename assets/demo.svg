<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="gradV" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="codeClip">
      <rect x="170" y="100" width="0" height="30">
        <animate attributeName="width" from="0" to="460" dur="2.5s" begin="0.5s" fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <style>
    @keyframes cursorBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes barPulse1 {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(1.3); }
    }
    @keyframes barPulse2 {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(1.25); }
    }
    @keyframes barFadeIn {
      from { opacity: 0; transform: scaleY(0); }
      to { opacity: 1; transform: scaleY(1); }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="400" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="800" y2="100" stroke="white" stroke-width="1"/>
    <line x1="0" y1="200" x2="800" y2="200" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative glow orb -->
  <circle cx="400" cy="200" r="180" fill="#6366f1" opacity="0.04">
    <animate attributeName="opacity" values="0.03;0.06;0.03" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Terminal window frame -->
  <rect x="120" y="50" width="560" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Terminal dots -->
  <circle cx="145" cy="70" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="163" cy="70" r="5" fill="#eab308" opacity="0.8"/>
  <circle cx="181" cy="70" r="5" fill="#22c55e" opacity="0.8"/>
  <!-- Terminal title bar line -->
  <line x1="120" y1="85" x2="680" y2="85" stroke="#334155" stroke-width="1"/>

  <!-- Code text with typing animation -->
  <g clip-path="url(#codeClip)">
    <text x="170" y="115" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace" font-size="22" fill="#94a3b8">
      <tspan fill="#c084fc">haptic</tspan><tspan fill="#94a3b8">.</tspan><tspan fill="#67e8f9">play</tspan><tspan fill="#fbbf24">(</tspan><tspan fill="#a5f3fc">'</tspan><tspan fill="#34d399">~~</tspan><tspan fill="#64748b">..</tspan><tspan fill="#facc15">##</tspan><tspan fill="#64748b">..</tspan><tspan fill="#f472b6">@@</tspan><tspan fill="#a5f3fc">'</tspan><tspan fill="#fbbf24">)</tspan>
    </text>
  </g>

  <!-- Typing cursor -->
  <rect x="170" y="98" width="2" height="22" fill="#8b5cf6">
    <animate attributeName="x" values="170;170;630;630" keyTimes="0;0.15;0.9;1" dur="3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;1;0;1;0;1;0;1;0" dur="1s" begin="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Label -->
  <text x="400" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" letter-spacing="2" opacity="0">
    HAPTIC PATTERN VISUALIZATION
    <animate attributeName="opacity" from="0" to="0.8" dur="0.5s" begin="3s" fill="freeze"/>
  </text>

  <!-- Waveform visualization - bars growing from bottom center line at y=330 -->
  <!-- Each bar animates in after the typing completes -->

  <!-- ~~ light vibration - bar 1 -->
  <rect x="218" y="295" width="18" height="35" rx="3" fill="url(#gradV)" opacity="0" transform-origin="227 330">
    <animate attributeName="opacity" from="0" to="0.9" dur="0.2s" begin="3.2s" fill="freeze"/>
    <animate attributeName="y" values="330;295;295" keyTimes="0;0.5;1" dur="0.3s" begin="3.2s" fill="freeze"/>
    <animate attributeName="height" values="0;35;35" keyTimes="0;0.5;1" dur="0.3s" begin="3.2s" fill="freeze"/>
    <animate attributeName="height" values="35;42;35" dur="0.8s" begin="3.6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="295;288;295" dur="0.8s" begin="3.6s" repeatCount="indefinite"/>
  </rect>

  <!-- ~~ light vibration - bar 2 -->
  <rect x="242" y="300" width="18" height="30" rx="3" fill="url(#gradV)" opacity="0" transform-origin="251 330">
    <animate attributeName="opacity" from="0" to="0.85" dur="0.2s" begin="3.35s" fill="freeze"/>
    <animate attributeName="y" values="330;300;300" keyTimes="0;0.5;1" dur="0.3s" begin="3.35s" fill="freeze"/>
    <animate attributeName="height" values="0;30;30" keyTimes="0;0.5;1" dur="0.3s" begin="3.35s" fill="freeze"/>
    <animate attributeName="height" values="30;38;30" dur="0.8s" begin="3.75s" repeatCount="indefinite"/>
    <animate attributeName="y" values="300;292;300" dur="0.8s" begin="3.75s" repeatCount="indefinite"/>
  </rect>

  <!-- .. pause gap - bar 3 (tiny) -->
  <rect x="278" y="322" width="18" height="8" rx="3" fill="#334155" opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" dur="0.2s" begin="3.5s" fill="freeze"/>
  </rect>

  <!-- .. pause gap - bar 4 (tiny) -->
  <rect x="302" y="322" width="18" height="8" rx="3" fill="#334155" opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" dur="0.2s" begin="3.6s" fill="freeze"/>
  </rect>

  <!-- ## medium vibration - bar 5 -->
  <rect x="338" y="270" width="18" height="60" rx="3" fill="url(#gradV)" opacity="0" transform-origin="347 330">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="3.75s" fill="freeze"/>
    <animate attributeName="y" values="330;270;270" keyTimes="0;0.5;1" dur="0.3s" begin="3.75s" fill="freeze"/>
    <animate attributeName="height" values="0;60;60" keyTimes="0;0.5;1" dur="0.3s" begin="3.75s" fill="freeze"/>
    <animate attributeName="height" values="60;70;60" dur="0.6s" begin="4.15s" repeatCount="indefinite"/>
    <animate attributeName="y" values="270;260;270" dur="0.6s" begin="4.15s" repeatCount="indefinite"/>
  </rect>

  <!-- ## medium vibration - bar 6 -->
  <rect x="362" y="275" width="18" height="55" rx="3" fill="url(#gradV)" opacity="0" transform-origin="371 330">
    <animate attributeName="opacity" from="0" to="0.95" dur="0.2s" begin="3.9s" fill="freeze"/>
    <animate attributeName="y" values="330;275;275" keyTimes="0;0.5;1" dur="0.3s" begin="3.9s" fill="freeze"/>
    <animate attributeName="height" values="0;55;55" keyTimes="0;0.5;1" dur="0.3s" begin="3.9s" fill="freeze"/>
    <animate attributeName="height" values="55;68;55" dur="0.6s" begin="4.3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="275;262;275" dur="0.6s" begin="4.3s" repeatCount="indefinite"/>
  </rect>

  <!-- .. pause gap - bar 7 (tiny) -->
  <rect x="398" y="322" width="18" height="8" rx="3" fill="#334155" opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" dur="0.2s" begin="4.05s" fill="freeze"/>
  </rect>

  <!-- .. pause gap - bar 8 (tiny) -->
  <rect x="422" y="322" width="18" height="8" rx="3" fill="#334155" opacity="0">
    <animate attributeName="opacity" from="0" to="0.4" dur="0.2s" begin="4.15s" fill="freeze"/>
  </rect>

  <!-- @@ heavy vibration - bar 9 -->
  <rect x="458" y="235" width="18" height="95" rx="3" fill="url(#gradV)" opacity="0" filter="url(#glow)" transform-origin="467 330">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="4.3s" fill="freeze"/>
    <animate attributeName="y" values="330;235;235" keyTimes="0;0.5;1" dur="0.3s" begin="4.3s" fill="freeze"/>
    <animate attributeName="height" values="0;95;95" keyTimes="0;0.5;1" dur="0.3s" begin="4.3s" fill="freeze"/>
    <animate attributeName="height" values="95;110;95" dur="0.45s" begin="4.7s" repeatCount="indefinite"/>
    <animate attributeName="y" values="235;220;235" dur="0.45s" begin="4.7s" repeatCount="indefinite"/>
  </rect>

  <!-- @@ heavy vibration - bar 10 -->
  <rect x="482" y="240" width="18" height="90" rx="3" fill="url(#gradV)" opacity="0" filter="url(#glow)" transform-origin="491 330">
    <animate attributeName="opacity" from="0" to="1" dur="0.2s" begin="4.45s" fill="freeze"/>
    <animate attributeName="y" values="330;240;240" keyTimes="0;0.5;1" dur="0.3s" begin="4.45s" fill="freeze"/>
    <animate attributeName="height" values="0;90;90" keyTimes="0;0.5;1" dur="0.3s" begin="4.45s" fill="freeze"/>
    <animate attributeName="height" values="90;108;90" dur="0.45s" begin="4.85s" repeatCount="indefinite"/>
    <animate attributeName="y" values="240;222;240" dur="0.45s" begin="4.85s" repeatCount="indefinite"/>
  </rect>

  <!-- Baseline -->
  <line x1="200" y1="330" x2="520" y2="330" stroke="#334155" stroke-width="1" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" dur="0.3s" begin="3.1s" fill="freeze"/>
  </line>

  <!-- Pattern labels beneath bars -->
  <g font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="11" opacity="0">
    <animate attributeName="opacity" from="0" to="0.6" dur="0.5s" begin="5s" fill="freeze"/>
    <text x="239" y="355" text-anchor="middle" fill="#34d399">~~</text>
    <text x="299" y="355" text-anchor="middle" fill="#64748b">..</text>
    <text x="359" y="355" text-anchor="middle" fill="#facc15">##</text>
    <text x="419" y="355" text-anchor="middle" fill="#64748b">..</text>
    <text x="479" y="355" text-anchor="middle" fill="#f472b6">@@</text>
  </g>

  <!-- Intensity labels -->
  <g font-family="system-ui, sans-serif" font-size="9" opacity="0" fill="#475569">
    <animate attributeName="opacity" from="0" to="0.5" dur="0.5s" begin="5s" fill="freeze"/>
    <text x="239" y="370" text-anchor="middle">light</text>
    <text x="359" y="370" text-anchor="middle">medium</text>
    <text x="479" y="370" text-anchor="middle">heavy</text>
  </g>

  <!-- haptic.js branding bottom right -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="0.6" dur="0.5s" begin="5s" fill="freeze"/>
    <text x="680" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="url(#grad)">haptic.js</text>
  </g>
</svg>